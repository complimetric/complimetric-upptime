name: Static Site CI
on:
  push:
    branches:
      - master
  workflow_run:
    workflows: ["Uptime CI"]
    types:
      - completed

jobs:
  publish:
    name: Deploy status page
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and deploy
        uses: upptime/uptime-monitor@v2
        with:
          UPPTIME_GH_PAT: ${{ secrets.GH_PAT }}
          TYPE: site
